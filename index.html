<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prepaid Meter Token Helper Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for retro LCD and modern layout -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZQMRNZ32K1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ZQMRNZ32K1');
</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans h-full flex flex-col justify-between">

    <!-- Header Area -->
    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-rose-500 to-amber-500 p-2 rounded-xl text-white shadow-md shadow-rose-500/10">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-base font-black tracking-tight leading-none">TokenAssist Pro</h1>
                <p class="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5 font-semibold tracking-wider uppercase">BPDB & STS Companion</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" aria-label="Toggle dark mode">
                <span id="themeIcon" class="text-lg">🌙</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow flex flex-col justify-start px-4 py-6 max-w-lg mx-auto w-full space-y-4">
        
        <!-- Input Status Alert Box -->
        <div id="statusToast" class="hidden p-3 rounded-2xl text-sm font-semibold transition-all duration-300 flex items-center gap-3 shadow-lg border border-slate-100 dark:border-slate-800/80">
            <span id="toastIcon" class="text-lg"></span>
            <span id="toastMessage" class="flex-grow"></span>
            <button onclick="hideToast()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 text-xs">✕</button>
        </div>

        <!-- VIEW 1: Input Form & Settings (Visible by default) -->
        <div id="viewInput" class="space-y-4">
            
            <!-- Paste Block -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-5 border border-slate-200 dark:border-slate-800/80 shadow-md space-y-4">
                <div class="flex items-center justify-between">
                    <div class="space-y-0.5">
                        <label for="rawToken" class="block text-sm font-extrabold text-slate-800 dark:text-slate-200">Paste Prepaid Token / Message</label>
                        <p class="text-[11px] text-slate-400 dark:text-slate-500">We auto-extract correct tokens and ignore other values.</p>
                    </div>
                    <button onclick="pasteFromClipboard()" class="text-xs text-rose-500 font-bold hover:underline flex items-center gap-1 bg-rose-50 dark:bg-rose-950/40 px-2.5 py-1 rounded-lg">
                        📋 Paste
                    </button>
                </div>
                
                <div class="relative">
                    <textarea id="rawToken" 
                              class="w-full h-40 p-4 font-mono text-base bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none resize-none transition tracking-wide text-slate-800 dark:text-slate-200"
                              placeholder="Paste SMS here..."></textarea>
                    
                    <!-- Quick Clear Button -->
                    <div class="absolute bottom-3 right-3 flex gap-2">
                        <button onclick="clearInput()" class="px-3 py-1.5 text-xs font-bold rounded-xl bg-slate-200/80 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition">
                            Clear
                        </button>
                    </div>
                </div>

                <!-- Split Logic Config & Detect Summary -->
                <div class="grid grid-cols-2 gap-3 pt-2 border-t border-slate-100 dark:border-slate-800">
                    <div class="space-y-1">
                        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Extraction Mode</span>
                        <select id="splitCount" onchange="detectTokenPatterns()" class="w-full bg-slate-100 dark:bg-slate-800 border-0 rounded-xl py-2 px-3 text-xs font-extrabold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-rose-500 cursor-pointer">
                            <option value="20" selected>STS Token (20 digits)</option>
                            <option value="16">Key/Security (16 digits)</option>
                            <option value="11">Meter ID (11 digits)</option>
                            <option value="custom">Custom Format</option>
                        </select>
                    </div>

                    <div class="space-y-1" id="customDigitBlock" style="display: none;">
                        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Custom Width</span>
                        <input type="number" id="customWidth" value="4" min="2" max="40" class="w-full bg-slate-100 dark:bg-slate-800 border-0 rounded-xl py-2 px-3 text-xs font-extrabold text-slate-800 dark:text-slate-200 focus:ring-2 focus:ring-rose-500">
                    </div>

                    <div id="patternSummary" class="col-span-2 bg-rose-50/50 dark:bg-rose-950/10 border border-rose-100 dark:border-rose-950/40 p-2.5 rounded-xl flex items-center justify-between">
                        <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Tokens Found:</span>
                        <span id="detectedCountBadge" class="text-xs font-black text-rose-600 dark:text-rose-400">0 Blocks Found</span>
                    </div>
                </div>
            </div>

            <!-- Run & Load Tools -->
            <div class="flex flex-col gap-3">
                <button onclick="startHelper()" class="w-full h-14 bg-gradient-to-r from-rose-600 to-amber-600 hover:from-rose-500 hover:to-amber-500 text-white font-black rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-rose-600/10 active:scale-[0.98] transition">
                    <span>⚡ Run Assistant</span>
                </button>
                
                <button onclick="loadDemoToken()" class="text-xs font-bold text-slate-400 dark:text-slate-500 text-center hover:text-rose-500 dark:hover:text-rose-400 transition-colors">
                    No token on hand? Click to load a Demo (220-digit multi-token layout)
                </button>
            </div>
        </div>

        <!-- VIEW 2: Active Split / Navigation Helper (Hidden by default) -->
        <div id="viewActive" class="hidden space-y-4">
            
            <!-- Interactive Token Reading Card -->
            <div class="bg-white dark:bg-slate-900 rounded-3xl p-5 border-2 border-rose-500/20 dark:border-rose-500/10 shadow-xl space-y-4">
                
                <!-- Action Row inside display -->
                <div class="flex justify-between items-center pb-3 border-b border-slate-100 dark:border-slate-800/80">
                    <button onclick="speechCurrent()" id="btnVoice" class="py-2 px-3 rounded-xl bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/60 transition flex items-center gap-2 text-xs font-extrabold shadow-sm">
                        <span id="voiceIcon">🔊</span> <span id="voiceBtnText">Listen</span>
                    </button>

                    <button onclick="copyCurrentChunk()" id="btnCopy" class="py-2 px-3 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition flex items-center gap-2 text-xs font-extrabold shadow-sm">
                        <span>📋</span> <span id="copyBtnText">Copy Code</span>
                    </button>
                </div>

                <!-- Readable dynamic spaced display -->
                <div class="py-3 flex flex-col justify-center items-center">
                    <div id="formattedOutput" class="font-mono font-black text-4xl sm:text-5xl text-slate-800 dark:text-slate-100 tracking-wide text-center leading-relaxed select-all">
                        <!-- Filled: 4512 • 9301 • 2241 • 0984 -->
                    </div>
                </div>

                <!-- Meter instructions step block -->
                <div class="glow-enter border border-rose-500/40 bg-rose-50/50 dark:bg-rose-950/10 rounded-2xl p-3.5 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl animate-bounce">👉</span>
                        <div>
                            <p class="text-[10px] font-black text-rose-500 dark:text-rose-400 uppercase tracking-widest">Meter Input Helper</p>
                            <p class="text-xs font-bold text-slate-700 dark:text-slate-300">Enter these digits, then press red/green <span class="bg-slate-200 dark:bg-slate-800 px-1 rounded font-mono">↵</span> Key.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dynamic Steps Checklist Progress -->
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-4 border border-slate-200 dark:border-slate-800/80 shadow-md">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Flow Checkpoint</span>
                    <span id="activeStepText" class="text-xs font-black text-rose-600 dark:text-rose-400">Step 1 of 6</span>
                </div>
                <div id="checkpointList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    <!-- Dynamic checkpoints -->
                </div>
            </div>

            <!-- BACK & RESET Controls -->
            <div class="pt-2 text-center">
                <button onclick="resetToInput()" class="text-xs font-black text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-widest flex items-center justify-center gap-1.5 mx-auto">
                    <span>⬅</span> Exit & Load New Token
                </button>
            </div>
        </div>
    </main>

    <!-- Sticky Footer Navigation Controllers -->
    <footer id="navFooter" class="hidden p-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] sticky bottom-0 z-50">
        <div class="max-w-lg mx-auto grid grid-cols-2 gap-4">
            <!-- Back Button -->
            <button id="btnPrev" onclick="navigateChunk(-1)" class="h-14 rounded-2xl border-2 border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-300 font-black text-base flex items-center justify-center gap-2 active:bg-slate-200 dark:active:bg-slate-800 transition">
                <span>◀ Back</span>
            </button>
            <!-- Next Button -->
            <button id="btnNext" onclick="navigateChunk(1)" class="h-14 rounded-2xl bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black text-base flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition">
                <span id="nextBtnText">Next Block ▶</span>
            </button>
        </div>
    </footer>

    <!-- Global Footer (Developed by) -->
    <footer class="py-4 text-center text-xs text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-auto">
        Developed by <a href="https://github.com/ALAMIN2134" target="_blank" class="font-bold text-rose-500 hover:underline">ALAMIN</a>
    </footer>

    <!-- External JS File -->
    <script src="script.js"></script>
</body>
</html>
